<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS El Carbonazo Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<!-- Pantalla de Bloqueo -->
<div id="pantalla-login" class="login-overlay">
    <div class="login-box">
        <i class="fas fa-fire" style="font-size: 3rem; color: var(--primario);"></i>
        <h2>El Carbonazo PRO</h2>
        <select id="login-usuario"></select>
        <input type="password" id="login-pin" maxlength="4" placeholder="****" inputmode="numeric">
        <button onclick="intentarLogin()" class="btn-exito">ENTRAR</button>
    </div>
</div>

<header>
    <div class="logo">EL CARBONAZO <span>PRO</span></div>
    <div class="usuario-selector">
        <i class="fas fa-user"></i>
        <select id="select-mesero"></select>
    </div>
    <div class="status-online"><i class="fas fa-cloud"></i> Cloud</div>
</header>

<section id="contenedor-mesas" class="mapa-mesas"></section>

<main class="contenedor-principal">
    <section class="seccion-menu">
        <div class="buscador">
            <i class="fas fa-search"></i>
            <input type="text" id="buscar-producto" placeholder="Buscar..." onkeyup="filtrarBusqueda()">
        </div>
        <div id="barra-categorias" class="filtros-categoria"></div>
        <div class="grid-productos" id="contenedor-menu"></div>
    </section>

    <section class="seccion-carrito">
        <div class="cabecera-carrito">
            <h3>PEDIDO</h3>
            <span id="label-mesa-activa">Ninguna mesa</span>
        </div>
        <div class="info-pedido">
            <select id="tipo-pedido">
                <option value="Mesa">Mesa</option>
                <option value="Llevar">Llevar</option>
            </select>
            <input type="text" id="id-mesa" readonly>
        </div>
        <div class="lista-items" id="items-carrito"></div>
        <div class="totales">
            <div class="fila-total"><span>Total:</span><span id="total-monto">C$ 0.00</span></div>
            <div class="botones-accion-carrito" style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:5px;">
                <button onclick="guardarPedidoTemporal()" class="btn-secundario"><i class="fas fa-save"></i></button>
                <button onclick="anularCuentaActual()" class="btn-anular"><i class="fas fa-trash"></i></button>
                <button onclick="finalizarVenta()" class="btn-exito"><i class="fas fa-check-circle"></i></button>
            </div>
        </div>
    </section>
</main>

<!-- Modales -->
<div id="modal-selector-cuentas" class="modal">
    <div class="contenido-modal">
        <header class="header-modal"><h2 id="titulo-selector-mesa"></h2><button onclick="cerrarSelectorCuentas()" class="btn-cerrar">&times;</button></header>
        <div id="lista-cuentas-mesa" style="padding:20px; display:grid; gap:10px;"></div>
        <button onclick="prepararNuevaSubCuenta()" class="btn-secundario" style="margin:10px; width:90%;">+ NUEVA CUENTA</button>
    </div>
</div>

<div id="modal-metodo-pago" class="modal">
    <div class="contenido-modal">
        <header class="header-modal"><h2>COBRAR</h2><button onclick="cerrarModalPago()" class="btn-cerrar">&times;</button></header>
        <div style="padding:20px; text-align:center;">
            <p>Subtotal: <span id="pago-subtotal"></span></p>
            <label>Propina:</label><br>
            <input type="number" id="input-propina" oninput="actualizarTotalConPropina()" style="font-size:1.5rem; width:150px; text-align:center;">
            <h1 id="pago-total-final"></h1>
            <button onclick="confirmarVentaFinal('Efectivo')" class="btn-pago" style="background:#2a9d8f; width:100%; margin-bottom:5px;">EFECTIVO</button>
            <button onclick="confirmarVentaFinal('Tarjeta')" class="btn-pago" style="background:#457b9d; width:100%; margin-bottom:5px;">TARJETA</button>
            <button onclick="confirmarVentaFinal('Transferencia')" class="btn-pago" style="background:#1d3557; width:100%;">TRANSF.</button>
        </div>
    </div>
</div>

<div id="modal-cierre" class="modal">
    <div class="contenido-modal">
        <header class="header-modal"><h2>CIERRE DE CAJA</h2><button onclick="cerrarModalCierre()" class="btn-cerrar">&times;</button></header>
        <div id="cuerpo-cierre"></div>
        <button onclick="window.print()" class="btn-exito" style="margin:10px;">IMPRIMIR</button>
    </div>
</div>

<div id="modal-admin-productos" class="modal">
    <div class="contenido-modal">
        <header class="header-modal"><h2>ADMIN MENU</h2><button onclick="cerrarModalAdmin()" class="btn-cerrar">&times;</button></header>
        <div style="padding:15px;">
            <input type="text" id="nuevo-nombre" placeholder="Nombre">
            <input type="number" id="nuevo-precio" placeholder="Precio">
            <input type="text" id="nuevo-icono" placeholder="Emoji">
            <input type="text" id="nuevo-categoria" placeholder="Cat">
            <button onclick="guardarNuevoProducto()" class="btn-exito">GUARDAR</button>
        </div>
        <table style="width:100%; padding:10px;"><tbody id="cuerpo-tabla-admin"></tbody></table>
    </div>
</div>

<div class="botones-flotantes">
    <button onclick="abrirAdminProductos()" class="btn-flotante gray"><i class="fas fa-cog"></i></button>
    <button onclick="abrirCierreCaja()" class="btn-flotante green"><i class="fas fa-file-invoice-dollar"></i></button>
</div>

<div id="area-impresion"></div>
<audio id="sonido-click" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>
<audio id="sonido-exito" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"></audio>

<script src="app.js"></script>
</body>
</html>
