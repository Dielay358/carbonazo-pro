<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS El Carbonazo Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<!-- Pantalla de Bloqueo -->
<div id="pantalla-login" class="login-overlay">
    <div class="login-box">
        <i class="fas fa-fire" style="font-size: 3rem; color: var(--primario);"></i>
        <h2>El Carbonazo PRO</h2>
        <select id="login-usuario"></select>
        <input type="password" id="login-pin" maxlength="4" placeholder="****" inputmode="numeric">
        <button onclick="intentarLogin()" class="btn-exito">ENTRAR</button>
    </div>
</div>

<header>
    <div class="logo">EL CARBONAZO <span>PRO</span></div>
    <div class="usuario-selector">
        <i class="fas fa-user"></i>
        <select id="select-mesero"></select>
    </div>
    <div class="status-online"><i class="fas fa-cloud"></i> Cloud</div><div class="tasa-display">
    <i class="fas fa-dollar-sign"></i> Cambio: <span id="header-tasa">0.00</span>
</div>
</header>

<section id="contenedor-mesas" class="mapa-mesas"></section>

<main class="contenedor-principal">
    <section class="seccion-menu">
        <div class="buscador">
            <i class="fas fa-search"></i>
            <input type="text" id="buscar-producto" placeholder="Buscar..." onkeyup="filtrarBusqueda()">
        </div>
        <div id="barra-categorias" class="filtros-categoria"></div>
        <div class="grid-productos" id="contenedor-menu"></div>
    </section>

    <section class="seccion-carrito">
        <div class="cabecera-carrito">
            <h3>PEDIDO</h3>
            <span id="label-mesa-activa">Ninguna mesa</span>
        </div>
        <div class="info-pedido">
            <select id="tipo-pedido">
                <option value="Mesa">Mesa</option>
                <option value="Llevar">Llevar</option>
            </select>
            <input type="text" id="id-mesa" readonly>
        </div>
        <div class="lista-items" id="items-carrito"></div>
        <div class="totales">
            <div class="fila-total"><span>Total:</span><span id="total-monto">C$ 0.00</span></div>
            <div class="botones-accion-carrito" style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:5px;">
                <button onclick="guardarPedidoTemporal()" class="btn-secundario"><i class="fas fa-save"></i></button>
                <button onclick="anularCuentaActual()" class="btn-anular"><i class="fas fa-trash"></i></button>
                <button onclick="finalizarVenta()" class="btn-exito"><i class="fas fa-check-circle"></i></button>
            </div>
        </div>
    </section>
</main>

<!-- Modales -->
<div id="modal-selector-cuentas" class="modal">
    <div class="contenido-modal">
        <header class="header-modal"><h2 id="titulo-selector-mesa"></h2><button onclick="cerrarSelectorCuentas()" class="btn-cerrar">&times;</button></header>
        <div id="lista-cuentas-mesa" style="padding:20px; display:grid; gap:10px;"></div>
        <button onclick="prepararNuevaSubCuenta()" class="btn-secundario" style="margin:10px; width:90%;">+ NUEVA CUENTA</button>
    </div>
</div>

<!-- Modal de Finalizar Pago (Versión Mejorada con Iconos y Colores) -->
<div id="modal-metodo-pago" class="modal">
    <div class="contenido-modal" style="max-width: 400px;">
        <header class="header-modal">
            <h2><i class="fas fa-file-invoice-dollar"></i> Finalizar Cuenta</h2>
            <!-- Busca donde está h1 id="pago-total-final" y añade esto abajo -->
<h2 id="pago-total-usd" style="color: #457b9d; margin-top: 0; font-size: 1.5rem;">$ 0.00</h2>
            <button onclick="cerrarModalPago()" class="btn-cerrar">&times;</button>
        </header>
        <div style="padding: 20px; text-align: center;">
            <p style="margin:0; color: #666;">Subtotal: <span id="pago-subtotal" style="font-weight: bold;">C$ 0.00</span></p>
            
            <div style="background: #f1faee; padding: 15px; border-radius: 12px; margin: 15px 0; border: 1px solid #d8e2dc;">
                <label style="font-weight: bold; display: block; margin-bottom: 8px; color: var(--exito);">
                    Propina Sugerida (10%):
                </label>
                <input type="number" id="input-propina" oninput="actualizarTotalConPropina()" 
                    style="width: 150px; font-size: 1.5rem; text-align: center; border: 2px solid var(--exito); border-radius: 8px; color: var(--oscuro);">
            </div>

            <h1 id="pago-total-final" style="color: var(--oscuro); margin: 15px 0; font-size: 2.5rem;">C$ 0.00</h1>
            
            <p style="color: #666; margin-bottom: 15px;">Seleccione Método de Pago:</p>
            
            <div style="display: grid; grid-template-columns: 1fr; gap: 12px;">
                <button onclick="confirmarVentaFinal('Efectivo')" class="btn-pago" style="background: #2a9d8f;">
                    <i class="fas fa-money-bill-wave"></i> EFECTIVO
                </button>
                <button onclick="confirmarVentaFinal('Tarjeta')" class="btn-pago" style="background: #457b9d;">
                    <i class="fas fa-credit-card"></i> TARJETA
                </button>
                <button onclick="confirmarVentaFinal('Transferencia')" class="btn-pago" style="background: #1d3557;">
                    <i class="fas fa-university"></i> TRANSFERENCIA
                </button>
            </div>
        </div>
    </div>
</div>

<div id="modal-cierre" class="modal">
    <div class="contenido-modal">
        <header class="header-modal"><h2>CIERRE DE CAJA</h2><button onclick="cerrarModalCierre()" class="btn-cerrar">&times;</button></header>
        <div id="cuerpo-cierre"></div>
        <button onclick="window.print()" class="btn-exito" style="margin:10px;">IMPRIMIR</button>
    </div>
</div>

<div id="modal-admin-productos" class="modal">
    <div class="contenido-modal">
        <header class="header-modal"><h2>ADMIN MENU</h2><button onclick="cerrarModalAdmin()" class="btn-cerrar">&times;</button></header>
        <div style="padding:15px;">
            <input type="text" id="nuevo-nombre" placeholder="Nombre">
            <input type="number" id="nuevo-precio" placeholder="Precio">
            <input type="text" id="nuevo-icono" placeholder="Emoji">
            <input type="text" id="nuevo-categoria" placeholder="Cat">
            <button onclick="guardarNuevoProducto()" class="btn-exito">GUARDAR</button>
        </div>
        <table style="width:100%; padding:10px;"><tbody id="cuerpo-tabla-admin"></tbody></table>
        <!-- Dentro del contenido-modal de Admin, añade esta navegación simple -->
        <div style="display: flex; gap: 10px; padding: 10px; background: #eee;">
             <button onclick="cambiarTabAdmin('prods')" class="btn-filtro">Productos</button>
             <button onclick="cambiarTabAdmin('users')" class="btn-filtro">Meseros</button>
             <button onclick="cambiarTabAdmin('config')" class="btn-filtro">Configuración</button>
        </div>

    <!-- Sección Meseros (oculta por defecto) -->
    <div id="tab-users" style="display:none; padding: 15px;">
        <h4>Gestionar Personal</h4>
        <div class="inputs-inline">
           <input type="text" id="nuevo-user-nombre" placeholder="Nombre">
           <input type="text" id="nuevo-user-pin" placeholder="PIN (4 dígitos)">
           <button onclick="guardarNuevoUsuario()" class="btn-exito"><i class="fas fa-user-plus"></i></button>
        </div>
        <table style="width:100%; margin-top:10px;"><tbody id="tabla-admin-usuarios"></tbody></table>
    </div>

    <!-- Sección Tasa de Cambio (oculta por defecto) -->
    <div id="tab-config" style="display:none; padding: 15px;">
        <h4>Ajustes del Sistema</h4>
        <label>Tasa de Cambio (NIO x 1 USD):</label>
        <input type="number" id="input-tasa-cambio" step="0.01" style="font-size: 1.5rem; text-align: center;">
        <button onclick="guardarTasaCambio()" class="btn-exito" style="width:100%; margin-top:10px;">ACTUALIZAR TASA</button>
    </div>
    </div>
</div>

<div class="botones-flotantes">
    <button onclick="abrirAdminProductos()" class="btn-flotante gray"><i class="fas fa-cog"></i></button>
    <button onclick="abrirCierreCaja()" class="btn-flotante green"><i class="fas fa-file-invoice-dollar"></i></button>
</div>

<div id="area-impresion"></div>
<audio id="sonido-click" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>
<audio id="sonido-exito" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"></audio>

<script src="app.js"></script>
</body>
</html>
