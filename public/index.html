<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS El Carbonazo Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<!-- SELECTOR DE ROL INICIAL -->
<div id="pantalla-inicio-rol" class="login-overlay">
    <div class="login-box">
        <i class="fas fa-fire" style="font-size: 3rem; color: var(--primario);"></i>
        <h2>El Carbonazo PRO</h2>
        <p>Seleccione modo de ingreso:</p>
        <div style="display: grid; gap: 15px;">
            <button onclick="entrarComoMesero()" class="btn-pago" style="background: var(--oscuro); color:white;">
                <i class="fas fa-utensils"></i> MODO MESERO
            </button>
            <button onclick="mostrarLoginAdmin()" class="btn-pago" style="background: var(--exito); color:white;">
                <i class="fas fa-user-shield"></i> MODO ADMINISTRADOR
            </button>
        </div>
    </div>
</div>

<!-- LOGIN PARA EL DUEÑO -->
<div id="pantalla-login-admin" class="login-overlay" style="display:none;">
    <div class="login-box">
        <button onclick="volverAlInicio()" style="float:right; border:none; background:none; cursor:pointer;"><i class="fas fa-times"></i></button>
        <h2>Acceso Admin</h2>
        <input type="password" id="login-pin-admin" maxlength="4" placeholder="PIN" inputmode="numeric">
        <button onclick="intentarLoginAdmin()" class="btn-exito" style="width:100%;">DESBLOQUEAR</button>
    </div>
</div>

<!-- CABECERA -->
<header>
    <div class="logo">EL CARBONAZO <span>PRO</span></div>
    <div class="usuario-selector">
        <i class="fas fa-user"></i>
        <select id="select-mesero" onchange="cambiarMesero()"></select>
    </div>
    <div id="indicador-rol" style="color:#ffd166; font-weight:bold; margin-left:10px; font-size:0.8rem;"></div>
    <div class="status-online"><i class="fas fa-cloud"></i> Cloud</div>
    <div class="tasa-display" style="color:white; margin-left:10px;">
        <i class="fas fa-dollar-sign"></i> <span id="header-tasa">0.00</span>
    </div>
</header>

<section id="contenedor-mesas" class="mapa-mesas"></section>

<main class="contenedor-principal">
    <section class="seccion-menu">
        <div class="buscador">
            <i class="fas fa-search"></i>
            <input type="text" id="buscar-producto" placeholder="Buscar..." onkeyup="filtrarBusqueda()">
        </div>
        <div id="barra-categorias" class="filtros-categoria"></div>
        <div class="grid-productos" id="contenedor-menu"></div>
    </section>

    <section class="seccion-carrito">
        <div class="cabecera-carrito">
            <h3>PEDIDO</h3>
            <span id="label-mesa-activa">Ninguna mesa</span>
        </div>
        <div class="info-pedido">
            <select id="tipo-pedido">
                <option value="Mesa">Mesa</option>
                <option value="Llevar">Llevar</option>
            </select>
            <input type="text" id="id-mesa" readonly>
        </div>
        <div class="lista-items" id="items-carrito"></div>
        <div class="totales">
            <div class="fila-total"><span>Total:</span><span id="total-monto">C$ 0.00</span></div>
            <div class="botones-accion-carrito" style="display:grid; grid-template-columns: repeat(4, 1fr); gap:5px;">
                <button onclick="guardarPedidoTemporal()" class="btn-secundario"><i class="fas fa-utensils"></i></button>
                <button onclick="imprimirPreCuenta()" class="btn-gray" style="background:#6c757d; color:white;"><i class="fas fa-file-invoice"></i></button>
                <button onclick="anularCuentaActual()" class="btn-anular"><i class="fas fa-trash-alt"></i></button>
                <button onclick="finalizarVenta()" class="btn-exito"><i class="fas fa-check-circle"></i></button>
            </div>
        </div>
    </section>
</main>

<!-- BOTONES FLOTANTES (ESTOS SON LOS QUE NO VEÍAS) -->
<div class="botones-flotantes" id="contenedor-botones-admin" style="display: none;">
    <button onclick="abrirModalVentas()" class="btn-flotante dark"><i class="fas fa-history"></i></button>
    <button onclick="abrirAdminProductos()" class="btn-flotante gray"><i class="fas fa-cog"></i></button>
    <button onclick="abrirCierreCaja()" class="btn-flotante green"><i class="fas fa-file-invoice-dollar"></i></button>
    <button onclick="cerrarSesionAdmin()" class="btn-flotante" style="background:#000;"><i class="fas fa-sign-out-alt"></i></button>
</div>

<!-- MODAL ADMINISTRACIÓN COMPLETO -->
<div id="modal-admin-productos" class="modal">
    <div class="contenido-modal">
        <header class="header-modal"><h2>ADMINISTRACIÓN</h2><button onclick="cerrarModal()" class="btn-cerrar">&times;</button></header>
        <div style="display:flex; gap:5px; padding:10px; background:#f0f0f0; justify-content:center;">
            <button onclick="cambiarTabAdmin('prods')" class="btn-filtro">Productos</button>
            <button onclick="cambiarTabAdmin('users')" class="btn-filtro">Meseros</button>
            <button onclick="cambiarTabAdmin('config')" class="btn-filtro">Configuración</button>
            <button onclick="cambiarTabAdmin('stats')" class="btn-filtro">Estadísticas</button>
        </div>
        <div class="tabla-contenedor" style="max-height:450px; overflow-y:auto;">
            <!-- TAB PRODUCTOS -->
            <div id="tab-prods" class="admin-tab-content">
                <div style="background:#e9ecef; padding:15px; border-radius:10px; margin-bottom:15px;">
                    <div class="inputs-inline">
                        <input type="text" id="nuevo-nombre" placeholder="Nombre">
                        <input type="number" id="nuevo-precio" placeholder="C$">
                        <input type="text" id="nuevo-icono" placeholder="Emoji">
                        <input type="text" id="nuevo-categoria" placeholder="Cat">
                        <input type="number" id="nuevo-stock" placeholder="Stock">
                        <button onclick="guardarNuevoProducto()" class="btn-exito">OK</button>
                        <button onclick="abrirPegarMasivo()" class="btn-secundario" style="background:#457b9d;"><i class="fas fa-paste"></i> PEGAR</button>
                    </div>
                </div>
                <table style="width:100%;"><thead><tr><th>Icono</th><th>Nombre</th><th>Precio</th><th>Stock</th><th>Acción</th></tr></thead><tbody id="cuerpo-tabla-admin"></tbody></table>
            </div>
            <!-- TAB MESEROS -->
            <div id="tab-users" class="admin-tab-content" style="display:none;">
                <div style="background:#e9ecef; padding:15px; border-radius:10px;"><input type="text" id="nuevo-user-nombre" placeholder="Nombre"><input type="text" id="nuevo-user-pin" placeholder="PIN"><button onclick="guardarNuevoUsuario()" class="btn-exito">AÑADIR</button></div>
                <table style="width:100%;"><tbody id="tabla-admin-usuarios"></tbody></table>
            </div>
            <!-- TAB CONFIG -->
            <div id="tab-config" class="admin-tab-content" style="display:none; text-align:center; padding:20px;">
                <p>Tasa de cambio (NIO x 1 USD)</p>
                <input type="number" id="input-tasa-cambio" step="0.01" style="font-size:2rem; width:150px; text-align:center;">
                <button onclick="guardarTasaCambio()" class="btn-exito" style="width:100%; margin-top:20px;">ACTUALIZAR</button>
            </div>
            <!-- TAB STATS -->
            <div id="tab-stats" class="admin-tab-content" style="display:none; padding:15px;">
                <canvas id="chartProductos"></canvas>
                <canvas id="chartPagos" style="margin-top:20px;"></canvas>
            </div>
        </div>
    </div>
</div>

<!-- (Resto de modales: Pago, Cierre, Historial, Pegar Masivo se mantienen con sus IDs) -->
<div id="modal-metodo-pago" class="modal">...</div>
<div id="modal-ventas" class="modal">...</div>
<div id="modal-cierre" class="modal">...</div>
<div id="modal-pegar-masivo" class="modal">...</div>
<div id="modal-selector-cuentas" class="modal">...</div>

<div id="area-impresion"></div>
<audio id="sonido-click" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>
<audio id="sonido-exito" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"></audio>

<script src="app.js"></script>
</body>
</html>
