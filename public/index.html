<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS El Carbonazo Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<!-- PANTALLA DE LOGIN -->
<div id="pantalla-login" class="login-overlay">
    <div class="login-box">
        <i class="fas fa-fire" style="font-size: 3rem; color: var(--primario);"></i>
        <h2>El Carbonazo PRO</h2>
        <select id="login-usuario"></select>
        <input type="password" id="login-pin" maxlength="4" placeholder="****" inputmode="numeric">
        <button onclick="intentarLogin()" class="btn-exito">ENTRAR</button>
    </div>
</div>

<!-- ENCABEZADO -->
<header>
    <div class="logo">EL CARBONAZO <span>PRO</span></div>
    <div class="usuario-selector">
        <i class="fas fa-user"></i>
        <select id="select-mesero"></select>
    </div>
    <div class="status-online"><i class="fas fa-cloud"></i> Cloud</div>
    <div class="tasa-display" style="color:white; margin-left:10px;">
        <i class="fas fa-dollar-sign"></i> Cambio: <span id="header-tasa">0.00</span>
    </div>
</header>

<!-- MAPA DE MESAS (CRÍTICO: Aquí se dibujan las mesas) -->
<section id="contenedor-mesas" class="mapa-mesas"></section>

<main class="contenedor-principal">
    <section class="seccion-menu">
        <div class="buscador">
            <i class="fas fa-search"></i>
            <input type="text" id="buscar-producto" placeholder="Buscar..." onkeyup="filtrarBusqueda()">
        </div>
        <div id="barra-categorias" class="filtros-categoria"></div>
        <div class="grid-productos" id="contenedor-menu"></div>
    </section>

    <section class="seccion-carrito">
        <div class="cabecera-carrito">
            <h3>PEDIDO</h3>
            <span id="label-mesa-activa">Ninguna mesa</span>
        </div>
        <div class="info-pedido">
            <select id="tipo-pedido">
                <option value="Mesa">Mesa</option>
                <option value="Llevar">Llevar</option>
            </select>
            <input type="text" id="id-mesa" readonly>
        </div>
        <div class="lista-items" id="items-carrito"></div>
        <div class="totales">
            <div class="fila-total"><span>Total:</span><span id="total-monto">C$ 0.00</span></div>
            <div class="botones-accion-carrito" style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:5px;">
                <!-- 1. PENDIENTE (Cocina) -->
                <button onclick="guardarPedidoTemporal()" class="btn-secundario" title="Enviar a Cocina">
                    <i class="fas fa-utensils"></i>
                </button>
                <!-- 2. ANULAR (Borrar mesa) -->
                <button onclick="anularCuentaActual()" class="btn-anular" title="Anular Cuenta">
                    <i class="fas fa-trash-alt"></i>
                </button>
                <!-- 3. COBRAR (Finalizar) -->
                <button onclick="finalizarVenta()" class="btn-exito" title="Cobrar">
                    <i class="fas fa-check-circle"></i>
                </button>
            </div>
        </div>
    </section>
</main>

<!-- MODALES -->
<div id="modal-selector-cuentas" class="modal">
    <div class="contenido-modal">
        <header class="header-modal"><h2 id="titulo-selector-mesa"></h2><button onclick="cerrarModal()" class="btn-cerrar">&times;</button></header>
        <div id="lista-cuentas-mesa" style="padding:20px; display:grid; gap:10px;"></div>
        <button onclick="prepararNuevaSubCuenta()" class="btn-secundario" style="margin:10px; width:90%;">+ NUEVA CUENTA</button>
    </div>
</div>

<div id="modal-metodo-pago" class="modal">
    <div class="contenido-modal" style="max-width: 400px;">
        <header class="header-modal"><h2>PAGO</h2><button onclick="cerrarModal()" class="btn-cerrar">&times;</button></header>
        <div style="padding: 20px; text-align: center;">
            <div style="background:#eee; padding:10px; border-radius:10px; margin-bottom:15px; display:flex; gap:5px;">
                <input type="text" id="cliente-nombre" placeholder="Cliente" style="flex:2;">
                <input type="text" id="cliente-tel" placeholder="Tel" style="flex:1;">
            </div>
            <p>Subtotal: <span id="pago-subtotal"></span></p>
            <div style="background:#f1faee; padding:10px; border-radius:12px; margin:10px 0; border:1px solid #ddd;">
                <label>Propina (10%):</label><br>
                <input type="number" id="input-propina" oninput="actualizarTotalConPropina()" style="width:120px; font-size:1.2rem; text-align:center;">
            </div>
            <h1 id="pago-total-final" style="margin:5px 0;"></h1>
            <h2 id="pago-total-usd" style="color:#457b9d; margin:0;"></h2>
            <div style="display:grid; gap:8px; margin-top:15px;">
                <button onclick="confirmarVentaFinal('Efectivo')" class="btn-pago" style="background:#2a9d8f; color:white;">EFECTIVO</button>
                <button onclick="confirmarVentaFinal('Tarjeta')" class="btn-pago" style="background:#457b9d; color:white;">TARJETA</button>
                <button onclick="confirmarVentaFinal('Transferencia')" class="btn-pago" style="background:#1d3557; color:white;">TRANSF.</button>
            </div>
        </div>
    </div>
</div>

<div id="modal-ventas" class="modal">
    <div class="contenido-modal">
        <header class="header-modal"><h2>HISTORIAL</h2><button onclick="cerrarModal()" class="btn-cerrar">&times;</button></header>
        <div class="tabla-contenedor"><table><thead><tr><th>ID</th><th>Fecha</th><th>Mesa</th><th>Mesero</th><th>Total</th><th>Acción</th></tr></thead><tbody id="cuerpo-tabla-ventas"></tbody></table></div>
    </div>
</div>

<div id="modal-admin-productos" class="modal">
    <div class="contenido-modal">
        <header class="header-modal"><h2>ADMINISTRACIÓN</h2><button onclick="cerrarModal()" class="btn-cerrar">&times;</button></header>
        <div style="display:flex; gap:5px; padding:10px; background:#f0f0f0; justify-content:center;">
            <button onclick="cambiarTabAdmin('prods')" class="btn-filtro">Productos</button>
            <button onclick="cambiarTabAdmin('users')" class="btn-filtro">Meseros</button>
            <button onclick="cambiarTabAdmin('config')" class="btn-filtro">Configuración</button>
        </div>
        <div class="tabla-contenedor" style="max-height:450px; overflow-y:auto;">
            <div id="tab-prods" class="admin-tab-content">
                <div style="background:#e9ecef; padding:15px; border-radius:10px; margin-bottom:15px;">
                    <div class="inputs-inline">
                        <input type="text" id="nuevo-nombre" placeholder="Nombre">
                        <input type="number" id="nuevo-precio" placeholder="Precio">
                        <input type="text" id="nuevo-icono" placeholder="Emoji">
                        <input type="text" id="nuevo-categoria" placeholder="Cat">
                        <input type="number" id="nuevo-stock" placeholder="Stock">
                        <button onclick="guardarNuevoProducto()" class="btn-exito">OK</button>
                    </div>
                </div>
                <table style="width:100%;"><thead><tr><th>Icono</th><th>Nombre</th><th>Precio</th><th>Stock</th><th>Acción</th></tr></thead><tbody id="cuerpo-tabla-admin"></tbody></table>
            </div>
            <div id="tab-users" class="admin-tab-content" style="display:none;">
                <div style="background:#e9ecef; padding:15px; border-radius:10px;"><div class="inputs-inline"><input type="text" id="nuevo-user-nombre" placeholder="Nombre"><input type="text" id="nuevo-user-pin" placeholder="PIN"><button onclick="guardarNuevoUsuario()" class="btn-exito">AÑADIR</button></div></div>
                <table style="width:100%; margin-top:10px;"><tbody id="tabla-admin-usuarios"></tbody></table>
            </div>
            <div id="tab-config" class="admin-tab-content" style="display:none; padding:20px; text-align:center;">
                <p>Tasa de cambio (1 USD)</p>
                <input type="number" id="input-tasa-cambio" step="0.01" style="font-size:2rem; width:150px; text-align:center;">
                <button onclick="guardarTasaCambio()" class="btn-exito" style="width:100%; margin-top:20px;">ACTUALIZAR</button>
            </div>
        </div>
    </div>
</div>

<div id="modal-cierre" class="modal">
    <div class="contenido-modal" style="max-width:450px;">
        <header class="header-modal" style="background:var(--exito);"><h2>CIERRE DE CAJA</h2><button onclick="cerrarModal()" class="btn-cerrar">&times;</button></header>
        <div id="cuerpo-cierre"></div>
        <button onclick="window.print()" class="btn-exito" style="margin:15px; width:90%;">IMPRIMIR</button>
    </div>
</div>

<div class="botones-flotantes">
    <button onclick="abrirModalVentas()" class="btn-flotante dark"><i class="fas fa-history"></i></button>
    <button onclick="abrirAdminProductos()" class="btn-flotante gray"><i class="fas fa-cog"></i></button>
    <button onclick="abrirCierreCaja()" class="btn-flotante green"><i class="fas fa-file-invoice-dollar"></i></button>
</div>

<div id="area-impresion"></div>
<audio id="sonido-click" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>
<audio id="sonido-exito" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"></audio>

<script src="app.js"></script>
</body>
</html>
