<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor de Parrilla - El Carbonazo</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #1a1a1a; color: white; padding: 0; margin: 0; }
        .grid-cocina { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 15px; padding: 15px; }
        .pedido-card { background: #ffffff; color: #333; border-radius: 12px; padding: 15px; border-left: 8px solid var(--primario); position: relative; animation: blinkNew 0.5s ease-in-out; }
        @keyframes blinkNew { from { transform: scale(0.9); } to { transform: scale(1); } }
        .pedido-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f0f0f0; margin-bottom: 10px; }
        .item-row { font-size: 1.3rem; padding: 8px 0; border-bottom: 1px solid #f1f1f1; }
        .nota-cocina { background: #ffebee; color: #c62828; padding: 5px 10px; border-radius: 6px; font-size: 1rem; font-weight: bold; margin-top: 5px; border: 1px dashed #c62828; }
        .btn-listo { background: var(--exito); color: white; width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; margin-top: 15px; cursor: pointer; font-size: 1.1rem; }
    </style>
</head>
<body>
    <header style="background:var(--oscuro); display:flex; justify-content:space-between; align-items:center; padding:10px 20px;">
        <h2><i class="fas fa-fire"></i> MONITOR DE PARRILLA</h2>
        <div id="reloj" style="font-size: 1.5rem; font-family: monospace;"></div>
    </header>

    <div id="grid-cocina" class="grid-cocina"></div>

    <script>
        async function cargarPedidos() {
    try {
        // Llamada a la ruta que acabamos de crear en server.js
        const res = await fetch(window.location.origin + '/cocina-pendientes');
        if (!res.ok) throw new Error("Error en servidor");
        const pedidos = await res.json();
        const grid = document.getElementById('grid-cocina');
        
        grid.innerHTML = pedidos.map(p => {
            const items = JSON.parse(p.items);
            return `
                <div class="pedido-card">
                    <div class="pedido-header">
                        <h2>${p.mesa}</h2>
                        <span style="font-family:monospace;">${p.fecha_apertura.split(', ')[1]}</span>
                    </div>
                    <div>
                        ${items.map(i => `<div class="item-row"><strong>${i.cantidad}</strong> x ${i.nombre}</div>`).join('')}
                    </div>
                    <p>Mesero: ${p.mesero}</p>
                    <button class="btn-listo" onclick="marcarListo('${p.mesa}')">ORDEN COMPLETADA</button>
                </div>
            `;
        }).join('');
    } catch(e) { console.error("Monitor de cocina en espera de pedidos..."); }
}

        async function marcarListo(mesa) {
    const ok = confirm(`¿Marcar pedido de ${mesa} como LISTO?`);
    if (ok) {
        await fetch(window.location.origin + '/cocina-listo', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ mesa: mesa })
        });
        alert("Mesero notificado 🚀");
        cargarPedidos();
    }
}

        setInterval(cargarPedidos, 5000);
        cargarPedidos();
        setInterval(() => { document.getElementById('reloj').innerText = new Date().toLocaleTimeString(); }, 1000);
    </script>
</body>
</html>
